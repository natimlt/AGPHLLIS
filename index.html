<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGPHL LIS - Loading</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/icon-180.png">
    <meta name="theme-color" content="rgb(107, 26, 26)">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* ===== SPLASH SCREEN STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #6b1a1a 0%, #a02c2c 50%, #4a8bc2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .splash-screen {
            text-align: center;
            padding: 40px;
            animation: fadeIn 1s ease-out;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: pulse 2s infinite;
        }

        .splash-logo svg {
            width: 70px;
            height: 70px;
            fill: white;
        }

        .splash-logo img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 15px;
        }

        .splash-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .splash-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .splash-hospital {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .loading-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
        }

        .loading-dot {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 2px;
            width: 0%;
            animation: loading 2s ease-in-out forwards;
        }

        .splash-version {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-top: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @media (max-width: 768px) {
            .splash-title { font-size: 1.8rem; }
            .splash-subtitle { font-size: 0.95rem; }
            .splash-logo { width: 90px; height: 90px; }
            .splash-logo svg { width: 50px; height: 50px; }
            .progress-bar { width: 250px; }
        }
    </style>
</head>
<body>
    <div class="splash-screen">
        <!-- Logo -->
        <div class="splash-logo" id="splashLogo">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        </div>

        <h1 class="splash-title">AGPHL LIS</h1>
        <p class="splash-subtitle">Laboratory Information System</p>

        <div class="loading-container">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="splash-version">Version 2.0</div>
    </div>

    <script>
        // Check for logo in local storage
        const storedLogo = localStorage.getItem('hospitalLogo');
        if (storedLogo) {
            const logoContainer = document.getElementById('splashLogo');
            if (logoContainer) {
                logoContainer.innerHTML = `<img src="${storedLogo}" alt="Hospital Logo">`;
            }
        }

        // Redirect to login after splash screen
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 3000);

        // Register the service worker as early as possible so offline
        // support is ready by the time the person reaches the login page.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').catch(() => {});
        }
    </script>
</body>
</html>
